    <script>
      // Restore path from GitHub Pages 404.html redirect
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>

    <style>
  #mob-menu-btn {
    display: none;
    position: fixed;
    top: 14px;
    left: 12px;
    z-index: 200;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.07);
    color: #fff;
    cursor: pointer;
  }
  #mob-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99;
    backdrop-filter: blur(4px);
  }
  #mob-overlay.open { display: block; }
  @media (max-width: 767px) {
    #mob-menu-btn { display: flex !important; }
    .w-64.fixed {
      transform: translateX(-100%);
      transition: transform 0.3s ease !important;
      z-index: 100 !important;
    }
    .w-64.fixed.mob-open { transform: translateX(0) !important; }
    .ml-64 { margin-left: 0 !important; }
    main.overflow-y-auto { padding: 1rem !important; }
    header.h-16 { padding-left: 56px !important; padding-right: 1rem !important; }
  }
  @media (min-width: 768px) {
    #mob-menu-btn { display: none !important; }
    #mob-overlay  { display: none !important; }
  }
</style></head>
  <body>
    <div id="root"></div>
    <script>
(function(){
  var ov = document.createElement('div');
  ov.id = 'mob-overlay';
  document.body.appendChild(ov);

  var btn = document.createElement('button');
  btn.id = 'mob-menu-btn';
  btn.setAttribute('aria-label','Menu');
  btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
  document.body.appendChild(btn);

  var isOpen = false;

  function getSidebar(){ return document.querySelector('.w-64.fixed'); }

  function openM(){
    var s = getSidebar(); if(!s) return;
    s.classList.add('mob-open');
    ov.classList.add('open');
    isOpen = true;
  }
  function closeM(){
    var s = getSidebar(); if(!s) return;
    s.classList.remove('mob-open');
    ov.classList.remove('open');
    isOpen = false;
  }

  btn.addEventListener('click', function(e){ e.stopPropagation(); isOpen ? closeM() : openM(); });
  ov.addEventListener('click', closeM);

  document.addEventListener('click', function(e){
    if(isOpen && e.target.closest && e.target.closest('a') && !e.target.closest('#mob-menu-btn')){
      setTimeout(closeM, 200);
    }
  });

  window.addEventListener('resize', function(){ if(window.innerWidth >= 768) closeM(); });
})();
</script></body>
