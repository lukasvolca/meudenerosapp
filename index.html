          var decoded = l.search

            .map(function (s) {
              return s.replace(/~and~/g, "&");

          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              decoded[0] +
              (decoded[1] ? "?" + decoded[1] : "") +
              l.hash,
          );
        }
      })(window.location);

    <script>
      (function () {
        var ov = document.createElement("div");
        ov.id = "mob-overlay";
        document.body.appendChild(ov);

        var btn = document.createElement("button");
        btn.id = "mob-menu-btn";
        btn.setAttribute("aria-label", "Menu");
        btn.innerHTML =
          '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
        document.body.appendChild(btn);

        var isOpen = false;

        function getSidebar() {
          return document.querySelector(".w-64.fixed");
        }

        function openM() {
          var s = getSidebar();
          if (!s) return;
          s.classList.add("mob-open");
          ov.classList.add("open");
          isOpen = true;
        }
        function closeM() {
          var s = getSidebar();
          if (!s) return;
          s.classList.remove("mob-open");
          ov.classList.remove("open");
          isOpen = false;
        }

        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          isOpen ? closeM() : openM();
        });
        ov.addEventListener("click", closeM);

        document.addEventListener("click", function (e) {
          if (
            isOpen &&
            e.target.closest &&
            e.target.closest("a") &&
            !e.target.closest("#mob-menu-btn")
          ) {
            setTimeout(closeM, 200);
          }
        });

        window.addEventListener("resize", function () {
          if (window.innerWidth >= 768) closeM();
        });
      })();
    </script>
    <script>
      (function () {
        // Modal para Nova Categoria (mobile)
        var modEl = document.createElement("div");
        modEl.id = "cat-modal";
        modEl.style.cssText =
          "display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);" +
          "z-index:9999;align-items:center;justify-content:center;" +
          "padding:1.5rem;box-sizing:border-box;";
        modEl.innerHTML =
          '<div style="background:#18181b;border:1px solid rgba(255,255,255,0.12);' +
          "border-radius:1rem;padding:1.5rem;width:100%;max-width:360px;" +
          'box-shadow:0 25px 50px rgba(0,0,0,0.6);">' +
          '<h3 style="color:#fff;font-size:1rem;font-weight:600;margin:0 0 1rem;">Nova Categoria</h3>' +
          '<input id="cat-mod-inp" type="text" placeholder="Nome da categoria"' +
          ' style="width:100%;background:rgba(255,255,255,0.06);' +
          "border:1px solid rgba(255,255,255,0.12);border-radius:0.75rem;" +
          "padding:0.75rem 1rem;color:#fff;font-size:1rem;outline:none;" +
          'box-sizing:border-box;margin-bottom:1rem;"/>' +
          '<p id="cat-mod-ok" style="display:none;text-align:center;' +
          'color:#22c55e;font-size:1rem;font-weight:600;padding:0.5rem 0 1rem;"></p>' +
          '<div id="cat-mod-actions" style="display:flex;gap:0.5rem;">' +
          '<button id="cat-mod-cancel" style="flex:1;padding:0.75rem;' +
          "background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);" +
          'border-radius:0.75rem;color:#aaa;font-size:0.875rem;cursor:pointer;">Cancelar</button>' +
          '<button id="cat-mod-save" style="flex:1;padding:0.75rem;' +
          "background:#22c55e;border:none;border-radius:0.75rem;" +
          'color:#000;font-size:0.875rem;font-weight:700;cursor:pointer;">Criar</button>' +
          "</div></div>";
        document.body.appendChild(modEl);

        var inp = document.getElementById("cat-mod-inp");
        var cancelBtn = document.getElementById("cat-mod-cancel");
        var saveBtn = document.getElementById("cat-mod-save");

        function openModal() {
          modEl.style.display = "flex";
          setTimeout(function () {
            inp.focus();
          }, 50);
        }

        function closeModal(resetReact) {
          modEl.style.display = "none";
          inp.value = "";
          inp.style.borderColor = "";
          if (resetReact) {
            var ri = document.querySelector(
              'input[placeholder="Nome da nova categoria"]',
            );
            if (ri) {
              var btns = Array.from(ri.parentElement.children).filter(
                function (el) {
                  return el.tagName === "BUTTON";
                },
              );
              if (btns.length >= 2) btns[btns.length - 1].click();
            }
          }
        }

        function showSuccess(val) {
          inp.style.display = "none";
          document.getElementById("cat-mod-actions").style.display = "none";
          var ok = document.getElementById("cat-mod-ok");
          ok.textContent = "\u2713 \u201c" + val + "\u201d selecionada!";
          ok.style.display = "block";
          // After 900ms start fading out the modal, revealing the form beneath
          setTimeout(function () {
            modEl.style.transition = "opacity 0.5s ease";
            modEl.style.opacity = "0";
            setTimeout(function () {
              modEl.style.transition = "";
              modEl.style.opacity = "";
              ok.style.display = "none";
              inp.style.display = "";
              document.getElementById("cat-mod-actions").style.display = "";
              closeModal(false);
            }, 500);
          }, 900);
        function submitModal() {
          var val = inp.value.trim();
          if (!val) {
            inp.style.borderColor = "#ef4444";
            setTimeout(function () {
              inp.style.borderColor = "";
            }, 1500);
            return;
          }
          var ri = document.querySelector(
            'input[placeholder="Nome da nova categoria"]',
          );
          if (!ri) {
            closeModal(false);
            return;
          }

          // Restore display so React processes events on a live element
          ri.parentElement.style.display = "";

          // Set value via native setter
          var nativeSetter = Object.getOwnPropertyDescriptor(
            HTMLInputElement.prototype,
            "value",
          ).set;
          nativeSetter.call(ri, val);

          // Trigger React's onChange to update the V state variable
          ri.dispatchEvent(new Event("input", { bubbles: true }));

          // Wait 150ms so React 18 commits the state update, then
          // simulate Enter — the onKeyDown handler calls he() which
          // creates the category AND selects it (C(K))
          setTimeout(function () {
            ri.dispatchEvent(
              new KeyboardEvent("keydown", {
                key: "Enter",
                code: "Enter",
                keyCode: 13,
                which: 13,
                bubbles: true,
              }),
            );
            showSuccess(val);
          }, 150);
        }

        cancelBtn.addEventListener("click", function () {
          closeModal(true);
        });
        saveBtn.addEventListener("click", submitModal);
        modEl.addEventListener("click", function (e) {
          if (e.target === modEl) closeModal(true);
        });
        inp.addEventListener("keydown", function (e) {
          if (e.key === "Enter") submitModal();
          if (e.key === "Escape") closeModal(true);
        });

        // Intercepta o formulário inline no mobile
        var obs = new MutationObserver(function () {
          if (window.innerWidth >= 768) return;
          var ri = document.querySelector(
            'input[placeholder="Nome da nova categoria"]',
          );
          if (ri && !ri._catModal) {
            ri._catModal = true;
            ri.parentElement.style.display = "none";
            openModal();
          }
        });
        obs.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script>
      (function () {
        var pending = false;

        function run() {
          if (window.innerWidth >= 768) return;

          // Abbreviate month: "abril 2026" → "abr 2026"
          var span = document.querySelector("header.h-16 .rounded-full span");
          if (span) {
            var txt = span.textContent.trim();
            if (txt.length > 8) {
              var p = txt.split(" ");
              if (p.length === 2)
                span.textContent = p[0].slice(0, 3) + " " + p[1];
            }
          }

        }

        new MutationObserver(function () {
          if (pending) return;
          pending = true;
          requestAnimationFrame(function () {
            pending = false;
            run();
          });
        }).observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true,
        });
      })();
    </script>

          document.getElementById("lp-edit").style.display = "";

          activeItem = item;

        }

        document.getElementById("lp-edit").addEventListener("click", function () {
          if (!activeItem) return;
          var b = activeItem.querySelector('button[title="Editar"]');
          closeModal();
          if (b) setTimeout(function () { b.click(); }, 80);
        });

        document.getElementById("lp-del").addEventListener("click", function () {
          document.getElementById("lp-edit").style.display = "none";
          document.getElementById("lp-del").style.display = "none";
          document.getElementById("lp-modal-title").style.display = "none";

        document.getElementById("lp-confirm-ok").addEventListener("click", function () {
          if (!activeItem) return;

          closeModal();
          if (b) setTimeout(function () { b.click(); }, 80);
        });

        document.getElementById("lp-confirm-cancel").addEventListener("click", closeModal);

        modal.addEventListener("click", function (e) {
          if (e.target === modal) closeModal();

        document.addEventListener("touchstart", function (e) {
          var item = e.target.closest(".glass-panel.rounded-xl.p-4.group");

          pressing = true;
          pressTimer = setTimeout(function () {
            if (pressing) {

        document.addEventListener("touchend", function () {
          pressing = false;
          clearTimeout(pressTimer);
        }, { passive: true });

        document.addEventListener("touchmove", function () {
          pressing = false;
          clearTimeout(pressTimer);
        }, { passive: true });
      })();

          '<p style="color:rgba(255,255,255,0.8);font-size:0.9rem;margin:0 0 1rem;">Excluir esta categoria? As transa\u00e7\u00f5es n\u00e3o ser\u00e3o apagadas.</p>' +
          '<div style="display:flex;gap:0.5rem;">' +
          '<button id="cat-lp-cancel" style="flex:1;padding:0.75rem;border-radius:0.75rem;border:none;background:rgba(255,255,255,0.1);color:#fff;font-size:0.875rem;font-weight:600;cursor:pointer;">Cancelar</button>' +
          '<button id="cat-lp-ok" style="flex:1;padding:0.75rem;border-radius:0.75rem;border:none;background:#ef4444;color:#fff;font-size:0.875rem;font-weight:600;cursor:pointer;">Excluir</button>' +
          "</div></div></div>";
        document.body.appendChild(catModal);

        var activeCatItem = null; // the cat-row div

        function closeCatModal() {
          catModal.style.display = "none";
          document.getElementById("cat-lp-confirm").style.display = "none";
          document.getElementById("cat-lp-edit").style.display = "";
          document.getElementById("cat-lp-del").style.display = "";
          activeCatItem = null;
        }

        function openCatModal(row) {
          activeCatItem = row;
          document.getElementById("cat-lp-name").textContent =
            row.dataset.name || "";
          catModal.style.display = "flex";
        }

        document.getElementById("cat-lp-edit").addEventListener("click", function () {
          if (!activeCatItem) return;
          var catId = activeCatItem.dataset.catId;
          closeCatModal();
          // Find the React edit button for this category pill
          setTimeout(function () {
            var pill = document.querySelector(
              '[data-cat-pill="' + catId + '"] button[title="Editar"]',
            );
            if (pill) pill.click();
          }, 80);
        });

        document.getElementById("cat-lp-del").addEventListener("click", function () {
          document.getElementById("cat-lp-edit").style.display = "none";
          document.getElementById("cat-lp-del").style.display = "none";
          document.getElementById("cat-lp-confirm").style.display = "block";
        });

        document.getElementById("cat-lp-ok").addEventListener("click", function () {
          if (!activeCatItem) return;
          var catId = activeCatItem.dataset.catId;
          closeCatModal();
          setTimeout(function () {
            var pill = document.querySelector(
              '[data-cat-pill="' + catId + '"] button[title="Excluir"]',
            );
            if (pill) pill.click();
          }, 80);
        });

        document.getElementById("cat-lp-cancel").addEventListener("click", closeCatModal);
        catModal.addEventListener("click", function (e) {
          if (e.target === catModal) closeCatModal();
        });

        // ---- Build / refresh category list ----
        var listEl = null;
        var catPressTimer = null;
        var catPressing = false;

        function formatBRL(n) {
          return "R$ " + n.toFixed(2).replace(".", ",").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function isOnCatPage() {
          // Only the categories page has .space-y-8 with a .glass-panel.space-y-4 inside
          return !!document.querySelector(".space-y-8 .glass-panel.space-y-4");
        }

        function buildCatList() {
          if (window.innerWidth >= 768) return;
          if (!isOnCatPage()) {
            if (listEl) listEl.style.display = "none";
            return;
          }

          var cats8 = document.querySelector(".space-y-8");
          if (!cats8) return;

          // Gather pills: each pill wrapper is a div inside flex.flex-wrap.gap-2
          var pills = Array.from(
            cats8.querySelectorAll(".flex.flex-wrap.gap-2 > div"),
          );

          // Skip if pills not rendered yet
          if (pills.length === 0) return;

          // Hide all native React sections via JS
          Array.from(cats8.children).forEach(function (ch) {
            ch.style.display = "none";
          });

          if (!listEl) {
            listEl = document.createElement("div");
            listEl.id = "cat-list";
            listEl.innerHTML = '<div class="cat-list-title">Categorias</div>';
          }

          // Clear rows (keep title)
          while (listEl.children.length > 1) listEl.removeChild(listEl.lastChild);

          // Collect transaction totals per category from the stats in DOM
          // We'll read what React rendered in the transaction list section
          var totals = {};
          document.querySelectorAll(".space-y-8 > div:last-child .glass-panel.rounded-xl.p-4.group").forEach(function (item) {
            // Each item has categoryName text and amount
            var catSpan = item.querySelector(".text-xs.text-muted-foreground");
            var amountSpan = item.querySelector(".font-bold.font-display");
            var isExpense = amountSpan && amountSpan.textContent.trim().startsWith("-") === false && item.querySelector(".text-destructive") !== null;
            if (catSpan && amountSpan) {
              var catName = catSpan.textContent.trim();
              var amtText = amountSpan.textContent.replace(/[R$+\-\s]/g, "").replace(",", ".").replace(/\./g, function(m, o, s) {
                return o < s.lastIndexOf(".") ? "" : ".";
              });
              var amt = parseFloat(amtText) || 0;
              totals[catName] = (totals[catName] || 0) + amt;
            }
          });

          pills.forEach(function (wrapper) {
            // Find the group div (non-editing state)
            var groupDiv = wrapper.querySelector(".group.relative");
            if (!groupDiv) return;

            // Get category name from the text button
            var nameBtn = groupDiv.querySelector("button.flex-1");
            if (!nameBtn) return;
            var name = nameBtn.textContent.trim();
            if (!name) return;

            // Icon is the first child element of the name button
            var iconEl = nameBtn.firstElementChild;
            var iconHtml = iconEl ? iconEl.outerHTML : '<span style="width:1.5rem;height:1.5rem;background:rgba(255,255,255,0.15);border-radius:50%;display:inline-block;"></span>';

            // Give the wrapper a data attribute for finding edit/delete buttons
            var catId = "cat-" + name.toLowerCase().replace(/\s+/g, "-");
            wrapper.setAttribute("data-cat-pill", catId);

            var total = totals[name] || 0;

            var row = document.createElement("div");
            row.className = "cat-row";
            row.dataset.catId = catId;
            row.dataset.name = name;
            row.innerHTML =
              '<div style="flex-shrink:0;width:2.8rem;height:2.8rem;display:flex;align-items:center;justify-content:center;">' +
              iconHtml +
              "</div>" +
              '<div class="cat-row-name">' + name + "</div>" +
              '<div class="cat-row-right">' +
              '<div class="cat-row-total">' + (total > 0 ? formatBRL(total) : "") + "</div>" +
              "</div>";

            // Long-press on the row
            row.addEventListener("touchstart", function (e) {
              catPressing = true;
              catPressTimer = setTimeout(function () {
                if (catPressing) {
                  openCatModal(row);
                  navigator.vibrate && navigator.vibrate(40);
                }
              }, 600);
            }, { passive: true });

            row.addEventListener("touchend", function () {
              catPressing = false;
              clearTimeout(catPressTimer);
            }, { passive: true });

            row.addEventListener("touchmove", function () {
              catPressing = false;
              clearTimeout(catPressTimer);
            }, { passive: true });

            listEl.appendChild(row);
          });

          // Inject list into main before the cats8 div (not inside it)
          var mainEl = cats8.closest("main") || document.querySelector("main");
          if (mainEl && !mainEl.contains(listEl)) {
            mainEl.insertBefore(listEl, cats8);
          }
          listEl.style.display = ""; // CSS controls: block on mobile, none on desktop
        }

        // Watch DOM for category page rendering
        var pending2 = false;
        new MutationObserver(function () {
          if (pending2) return;
          pending2 = true;
          requestAnimationFrame(function () {
            pending2 = false;
            buildCatList();
          });
        }).observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
