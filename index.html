    <script>
      // Restore path from GitHub Pages 404.html redirect
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              decoded[0] +
              (decoded[1] ? "?" + decoded[1] : "") +
              l.hash,
          );
        }
      })(window.location);

    <script>
      /* ==========================================
         Monthly Overview Widget
         ========================================== */
      (function () {
        "use strict";

        var MONTH_NAMES = [
          "Janeiro",
          "Fevereiro",
          "Março",
          "Abril",
          "Maio",
          "Junho",
          "Julho",
          "Agosto",
          "Setembro",
          "Outubro",
          "Novembro",
          "Dezembro",
        ];
        var PALETTE = [
          "#f87171",
          "#fb923c",
          "#fbbf24",
          "#facc15",
          "#60a5fa",
          "#818cf8",
          "#a78bfa",
          "#c084fc",
          "#f472b6",
          "#e879f9",
        ];

        function fmtBRL(n) {
          return n.toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL",
          });
        }

        function getMonthData() {
          // Read the currently selected month from the header span
          // The app renders: <span class="font-semibold ...">abril 2026</span>
          // (or abbreviated form "abr 2026" after our mobile tweak)
          var year, month;
          var headerSpan = document.querySelector(
            "header.h-16 span.font-semibold",
          );
          if (headerSpan) {
            var txt = (headerSpan.textContent || "").trim().toLowerCase();
            // Expand abbreviations back to full month names for matching
            var abbrevMap = {
              jan: "janeiro",
              fev: "fevereiro",
              mar: "março",
              abr: "abril",
              mai: "maio",
              jun: "junho",
              jul: "julho",
              ago: "agosto",
              set: "setembro",
              out: "outubro",
              nov: "novembro",
              dez: "dezembro",
            };
            // Replace abbreviation at start if found
            for (var abbr in abbrevMap) {
              if (txt.startsWith(abbr + " ")) {
                txt = abbrevMap[abbr] + txt.slice(abbr.length);
                break;
              }
            }
            var parts = txt.split(" ");
            var monthNames = [
              "janeiro",
              "fevereiro",
              "março",
              "abril",
              "maio",
              "junho",
              "julho",
              "agosto",
              "setembro",
              "outubro",
              "novembro",
              "dezembro",
            ];
            var mi = monthNames.indexOf(parts[0]);
            var yi = parseInt(parts[1], 10);
            if (mi !== -1 && !isNaN(yi)) {
              month = mi;
              year = yi;
            }
          }
          if (month === undefined) {
            var now = new Date();
            year = now.getFullYear();
            month = now.getMonth();
          }
          var transactions = [],
            categories = [];
          try {
            transactions = JSON.parse(
              localStorage.getItem("finance_transactions") || "[]",
            );
          } catch (e) {}
          try {
            categories = JSON.parse(
              localStorage.getItem("finance_categories") || "[]",
            );
          } catch (e) {}

          var expenses = transactions.filter(function (t) {
            if (t.type !== "expense") return false;
            var d = new Date(t.date);
            return d.getFullYear() === year && d.getMonth() === month;
          });

          var byCategory = {};
          expenses.forEach(function (t) {
            var id = t.categoryId || "__none__";
            if (!byCategory[id]) {
              var cat = categories.find(function (c) {
                return c.id === id;
              });
              byCategory[id] = {
                id: id,
                name: (cat && cat.name) || t.categoryName || "Outros",
                total: 0,
              };
            }
            byCategory[id].total += t.amount;
          });

          var sorted = Object.values(byCategory).sort(function (a, b) {
            return b.total - a.total;
          });
          var total = sorted.reduce(function (s, c) {
            return s + c.total;
          }, 0);
          return {
            sorted: sorted,
            total: total,
            monthName: MONTH_NAMES[month],
          };
        }

        function polarXY(cx, cy, r, angleDeg) {
          var rad = ((angleDeg - 90) * Math.PI) / 180;
          return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
        }

        function buildSVG(sorted, total) {
          if (!total) return "";
          var size = 300,
            cx = 150,
            cy = 150,
            r = 118,
            sw = 22;
          var capAngleDeg = Math.asin(sw / 2 / r) * (180 / Math.PI);
          var visualGap = 6;
          var currentAngle = 0;
          var segments = "";
          var count = sorted.length;
          sorted.forEach(function (seg, i) {
            var pct = seg.total / total;
            var totalSweep = pct * 360;
            var color = PALETTE[i % PALETTE.length];
            var arc = "",
              badge = "";
            if (count > 1) {
              var arcSweep = totalSweep - visualGap - 2 * capAngleDeg;
              if (arcSweep <= 0) {
                var mp = polarXY(cx, cy, r, currentAngle + totalSweep / 2);
                arc =
                  '<circle cx="' +
                  mp[0].toFixed(2) +
                  '" cy="' +
                  mp[1].toFixed(2) +
                  '" r="' +
                  sw / 2 +
                  '" fill="' +
                  color +
                  '"/>';
              } else {
                var arcStart = currentAngle + visualGap / 2 + capAngleDeg;
                var s = polarXY(cx, cy, r, arcStart);
                var e = polarXY(cx, cy, r, arcStart + arcSweep);
                var large = arcSweep > 180 ? 1 : 0;
                arc =
                  '<path d="M ' +
                  s[0].toFixed(2) +
                  " " +
                  s[1].toFixed(2) +
                  " A " +
                  r +
                  " " +
                  r +
                  " 0 " +
                  large +
                  " 1 " +
                  e[0].toFixed(2) +
                  " " +
                  e[1].toFixed(2) +
                  '"' +
                  ' fill="none" stroke="' +
                  color +
                  '" stroke-width="' +
                  sw +
                  '" stroke-linecap="round"/>';
              }
            } else {
              var s = polarXY(cx, cy, r, currentAngle);
              var e = polarXY(cx, cy, r, currentAngle + 359.99);
              arc =
                '<path d="M ' +
                s[0].toFixed(2) +
                " " +
                s[1].toFixed(2) +
                " A " +
                r +
                " " +
                r +
                " 0 1 1 " +
                e[0].toFixed(2) +
                " " +
                e[1].toFixed(2) +
                '"' +
                ' fill="none" stroke="' +
                color +
                '" stroke-width="' +
                sw +
                '" stroke-linecap="round"/>';
            }
            // Invisible wider hit area over the arc for easier tapping
            var hitSweep = Math.max(totalSweep - visualGap, 1);
            var hitStart = currentAngle + visualGap / 2;
            var hs = polarXY(cx, cy, r, hitStart);
            var he = polarXY(cx, cy, r, hitStart + hitSweep);
            var hitLarge = hitSweep > 180 ? 1 : 0;
            var hit =
              '<path d="M ' +
              hs[0].toFixed(2) +
              " " +
              hs[1].toFixed(2) +
              " A " +
              r +
              " " +
              r +
              " 0 " +
              hitLarge +
              " 1 " +
              he[0].toFixed(2) +
              " " +
              he[1].toFixed(2) +
              '"' +
              ' fill="none" stroke="transparent" stroke-width="' +
              (sw + 16) +
              '" stroke-linecap="butt"/>';
            if (totalSweep >= 22) {
              var midAngle = currentAngle + totalSweep / 2;
              var bp = polarXY(cx, cy, r, midAngle);
              var letter = seg.name.charAt(0).toUpperCase();
              badge =
                '<circle cx="' +
                bp[0].toFixed(2) +
                '" cy="' +
                bp[1].toFixed(2) +
                '" r="13" fill="rgba(0,0,0,0.55)"/>' +
                '<text x="' +
                bp[0].toFixed(2) +
                '" y="' +
                bp[1].toFixed(2) +
                '"' +
                ' text-anchor="middle" dominant-baseline="central"' +
                ' font-family="Inter,sans-serif" font-size="11" font-weight="800" fill="#fff">' +
                letter +
                "</text>";
            }
            // Wrap arc + hit area + badge in a group with data-catid for click navigation
            segments +=
              '<g data-catid="' +
              seg.id +
              '" style="cursor:pointer">' +
              arc +
              hit +
              badge +
              "</g>";
            currentAngle += totalSweep;
          });
          return (
            '<svg viewBox="0 0 ' +
            size +
            " " +
            size +
            '" style="display:block;width:100%;height:100%;">' +
            '<circle cx="' +
            cx +
            '" cy="' +
            cy +
            '" r="' +
            r +
            '" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="' +
            sw +
            '"/>' +
            segments +
            "</svg>"
          );
        }

        function buildWidget() {
          var data = getMonthData();
          var sorted = data.sorted,
            total = data.total,
            monthName = data.monthName;
          var top3 = sorted.slice(0, 3);
          var svg = buildSVG(sorted, total);

          var topHtml = top3
            .map(function (cat, i) {
              var color = PALETTE[i % PALETTE.length];
              var init = cat.name.charAt(0).toUpperCase();
              return (
                '<div class="dn-cat-item">' +
                '<div class="dn-cat-icon" style="background:' +
                color +
                "1a;border:1px solid " +
                color +
                "33;color:" +
                color +
                ';">' +
                init +
                "</div>" +
                '<span class="dn-cat-amount">' +
                fmtBRL(cat.total) +
                "</span>" +
                '<span class="dn-cat-name">' +
                cat.name +
                "</span>" +
                "</div>"
              );
            })
            .join("");

          var body =
            sorted.length === 0
              ? '<p class="dn-empty">Nenhuma despesa registrada em ' +
                monthName +
                ".</p>"
              : '<div class="dn-chart-wrap">' +
                '<div class="dn-chart-center">' +
                '<div class="dn-label">Gastos por categoria</div>' +
                '<div class="dn-total">' +
                fmtBRL(total) +
                "</div>" +
                "</div>" +
                svg +
                "</div>" +
                (top3.length
                  ? '<div class="dn-top-row">' + topHtml + "</div>"
                  : "");

          var el = document.createElement("div");
          el.id = "dn-overview-widget";
          el.innerHTML =
            '<div class="glass-panel dn-card">' +
            '<div class="dn-header">' +
            '<h3 class="dn-title">Gastos de ' +
            monthName +
            "</h3>" +
            '<button class="dn-link" id="dn-analyze-btn">' +
            'Analisar <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>' +
            "</button></div>" +
            body +
            "</div>";

          el.querySelector("#dn-analyze-btn").addEventListener(
            "click",
            function () {
              var base = window.location.pathname.match(/^(\/meudenerosapp)/)
                ? "/meudenerosapp"
                : "";
              history.pushState(null, "", base + "/categories");
              window.dispatchEvent(new PopStateEvent("popstate"));
            },
          );

          // Slice click: navigate to categories page with selected category
          el.querySelectorAll("svg [data-catid]").forEach(function (g) {
            g.addEventListener("click", function () {
              var catId = g.getAttribute("data-catid");
              var base = window.location.pathname.match(/^(\/meudenerosapp)/)
                ? "/meudenerosapp"
                : "";
              try {
                sessionStorage.setItem("dn_selected_cat", catId);
              } catch (e) {}
              history.pushState(null, "", base + "/categories");
              window.dispatchEvent(new PopStateEvent("popstate"));
            });
          });

          return el;
        }

        /* --------------------------------------------------
           Injection: insert directly into <main> as a sibling
           of React's AnimatePresence output so React's
           reconciler never touches it.
        -------------------------------------------------- */

        function getMain() {
          return (
            document.querySelector("main.overflow-y-auto") ||
            document.querySelector("main")
          );
        }

        function onDashboard() {
          // pathname can be "/" (custom domain / localhost)
          // or "/meudenerosapp" / "/meudenerosapp/" (GitHub Pages subpath, no Location override)
          // or "" in some edge cases.
          // We treat "dashboard" as: no known sub-route in the path.
          var p =
            window.location.pathname.replace(/^\/meudenerosapp/, "") || "/";
          return p === "/" || p === "" || p === "/dashboard";
        }

        var _injecting = false;

        var _lastWidgetMonth = null;

        function tryInject() {
          if (_injecting) return;

          if (!onDashboard()) {
            var dead = document.getElementById("dn-overview-widget");
            if (dead) dead.remove();
            _lastWidgetMonth = null;
            return;
          }

          // Detect the currently shown month from the header span
          var headerSpan = document.querySelector(
            "header.h-16 span.font-semibold",
          );
          var currentMonthKey = headerSpan
            ? headerSpan.textContent.trim()
            : null;

          var existing = document.getElementById("dn-overview-widget");
          // Rebuild if widget missing OR month changed
          if (existing && existing.querySelector(".dn-card")) {
            if (currentMonthKey && currentMonthKey !== _lastWidgetMonth) {
              existing.remove();
            } else {
              return;
            }
          }
          if (existing && !existing.querySelector(".dn-card"))
            existing.remove();

          var main = getMain();
          if (!main || !main.firstElementChild) return;

          _injecting = true;
          var widget = buildWidget();
          main.insertBefore(widget, main.firstElementChild);
          _lastWidgetMonth = currentMonthKey;
          _injecting = false;
        }

        function debounce(fn, ms) {
          var t;
          return function () {
            clearTimeout(t);
            t = setTimeout(fn, ms);
          };
        }

        var debouncedInject = debounce(tryInject, 180);

        var observer = new MutationObserver(function () {
          if (!onDashboard()) return;
          var w = document.getElementById("dn-overview-widget");
          if (!w || !w.querySelector(".dn-card")) debouncedInject();
        });
        observer.observe(document.body, { childList: true, subtree: true });

        window.addEventListener("popstate", function () {
          setTimeout(tryInject, 350);
        });

        setTimeout(tryInject, 300);
        setTimeout(tryInject, 750);
        setTimeout(tryInject, 1500);
        setInterval(function () {
          if (onDashboard()) {
            var w = document.getElementById("dn-overview-widget");
            if (!w || !w.querySelector(".dn-card")) tryInject();
          }
        }, 4000);
      })();
    </script>

    <script>
      (function () {
        // Modal para Nova Categoria (mobile)
        var modEl = document.createElement("div");
        modEl.id = "cat-modal";
        modEl.style.cssText =
          "display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);" +

          '<div id="cat-mod-actions" style="display:flex;gap:0.5rem;">' +

          "background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);" +

          '<button id="cat-mod-save" style="flex:1;padding:0.75rem;' +
          "background:#22c55e;border:none;border-radius:0.75rem;" +
          'color:#000;font-size:0.875rem;font-weight:700;cursor:pointer;">Criar</button>' +
          "</div></div>";
        document.body.appendChild(modEl);

        var inp = document.getElementById("cat-mod-inp");
        var cancelBtn = document.getElementById("cat-mod-cancel");
        var saveBtn = document.getElementById("cat-mod-save");

        function openModal() {
          modEl.style.display = "flex";
          setTimeout(function () {
            inp.focus();
          }, 50);
        }

        function closeModal(resetReact) {
          modEl.style.display = "none";
          inp.value = "";
          inp.style.borderColor = "";
          if (resetReact) {
            var ri = document.querySelector(
              'input[placeholder="Nome da nova categoria"]',
            );
            if (ri) {
              var btns = Array.from(ri.parentElement.children).filter(
                function (el) {
                  return el.tagName === "BUTTON";
                },
              );
              if (btns.length >= 2) btns[btns.length - 1].click();
            }
          }
        }

        function showSuccess(val) {
          inp.style.display = "none";
          document.getElementById("cat-mod-actions").style.display = "none";
          var ok = document.getElementById("cat-mod-ok");
          ok.textContent = "\u2713 \u201c" + val + "\u201d selecionada!";
          ok.style.display = "block";
          // After 900ms start fading out the modal, revealing the form beneath
          setTimeout(function () {
            modEl.style.transition = "opacity 0.5s ease";
            modEl.style.opacity = "0";
            setTimeout(function () {
              modEl.style.transition = "";
              modEl.style.opacity = "";
              ok.style.display = "none";
              inp.style.display = "";
              document.getElementById("cat-mod-actions").style.display = "";
              closeModal(false);
            }, 500);
          }, 900);
        }
        function submitModal() {
          var val = inp.value.trim();
          if (!val) {
            inp.style.borderColor = "#ef4444";
            setTimeout(function () {
              inp.style.borderColor = "";
            }, 1500);
            return;
          }
          var ri = document.querySelector(
            'input[placeholder="Nome da nova categoria"]',
          );
          if (!ri) {
            closeModal(false);
            return;
          }

          // Restore display so React processes events on a live element
          ri.parentElement.style.display = "";

          // Set value via native setter
          var nativeSetter = Object.getOwnPropertyDescriptor(
            HTMLInputElement.prototype,
            "value",
          ).set;
          nativeSetter.call(ri, val);

          // Trigger React's onChange to update the V state variable
          ri.dispatchEvent(new Event("input", { bubbles: true }));

          // Wait 150ms so React 18 commits the state update, then
          // simulate Enter — the onKeyDown handler calls he() which
          // creates the category AND selects it (C(K))
          setTimeout(function () {
            ri.dispatchEvent(
              new KeyboardEvent("keydown", {
                key: "Enter",
                code: "Enter",
                keyCode: 13,
                which: 13,
                bubbles: true,
              }),
            );
            showSuccess(val);
          }, 150);
        }

        cancelBtn.addEventListener("click", function () {
          closeModal(true);
        });
        saveBtn.addEventListener("click", submitModal);
        modEl.addEventListener("click", function (e) {
          if (e.target === modEl) closeModal(true);
        });
        inp.addEventListener("keydown", function (e) {
          if (e.key === "Enter") submitModal();
          if (e.key === "Escape") closeModal(true);
        });

        // Intercepta o formulário inline no mobile
        var obs = new MutationObserver(function () {
          if (window.innerWidth >= 768) return;
          var ri = document.querySelector(
            'input[placeholder="Nome da nova categoria"]',
          );
          if (ri && !ri._catModal) {
            ri._catModal = true;
            ri.parentElement.style.display = "none";
            openModal();
          }
        });
        obs.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script>
      (function () {
        var pending = false;

        function run() {
          if (window.innerWidth >= 768) return;

          // Abbreviate month: "abril 2026" → "abr 2026"
          var span = document.querySelector("header.h-16 .rounded-full span");
          if (span) {
            var txt = span.textContent.trim();
            if (txt.length > 8) {
              var p = txt.split(" ");
              if (p.length === 2)
                span.textContent = p[0].slice(0, 3) + " " + p[1];
            }
          }
        }

        new MutationObserver(function () {
          if (pending) return;
          pending = true;
          requestAnimationFrame(function () {
            pending = false;
            run();
          });
        }).observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true,
        });
      })();

        function saveRename() {
          var newName = document.getElementById("rename-inp").value.trim();

          // Optimistic UI update
          if (listEl) {

          modalOv.appendChild(modalBox);

          var iconGrid = document.getElementById("icon-modal-grid");

          function cleanupAll(andCancelReact) {
            if (modalClosed) return;

          document

              cleanupAll(true);

            if (e.target === modalOv) cleanupAll(true);

          var editBtn = cats8.querySelector(

              if (reactGrid || waitCount > 30) {
                clearInterval(waitTimer);
                if (!reactGrid) {

                // Build our icon buttons by cloning SVG content from the hidden React grid
                iconGrid.innerHTML = "";
                Array.from(reactGrid.children).forEach(function (reactBtn) {

                      // After icon selection React returns to edit view with new icon in state.

                      setTimeout(function () {

            // Watch for React exiting edit mode automatically

              if (

              ) {
                pickerObs.disconnect();
                pickerObs = null;

        function formatBRL(n) {
          return (
            "R$ " +
            n
              .toFixed(2)
              .replace(".", ",")
              .replace(/\B(?=(\d{3})+(?!\d))/g, ".")
          );

        var MONTHS_SHORT = [
          "Jan",
          "Fev",
          "Mar",
          "Abr",
          "Mai",
          "Jun",
          "Jul",
          "Ago",
          "Set",
          "Out",
          "Nov",
          "Dez",
        ];
        var MONTHS_FULL = [
          "Janeiro",
          "Fevereiro",
          "Mar\u00e7o",
          "Abril",
          "Maio",
          "Junho",
          "Julho",
          "Agosto",
          "Setembro",
          "Outubro",
          "Novembro",
          "Dezembro",
        ];

        function openCatDetail(catName, iconHtml) {
          var now = new Date();
          var curY = now.getFullYear(),
            curM = now.getMonth();
          var monthLabel = MONTHS_FULL[curM];

          // Read localStorage
          var transactions = [];
          var categories = [];
          try {
            transactions = JSON.parse(
              localStorage.getItem("finance_transactions") || "[]",
            );
          } catch (e) {}
          try {
            categories = JSON.parse(
              localStorage.getItem("finance_categories") || "[]",
            );
          } catch (e) {}

          var cat = categories.find(function (c) {
            return c.name === catName;
          });
          var realId = cat ? cat.id : null;

          function matchesCat(t) {
            return (
              t.type === "expense" &&
              (t.categoryId === realId ||
                (!realId && t.categoryName === catName) ||
                (realId && t.categoryName === catName))
            );
          }

          // Current-month expenses for this category
          var curTxns = transactions.filter(function (t) {
            if (!matchesCat(t)) return false;
            var d = new Date(t.date);
            return d.getFullYear() === curY && d.getMonth() === curM;
          });
          curTxns.sort(function (a, b) {
            return new Date(b.date) - new Date(a.date);
          });
          var curTotal = curTxns.reduce(function (s, t) {
            return s + t.amount;
          }, 0);

          // Last 6 months data for chart
          var chartData = [];
          for (var i = 5; i >= 0; i--) {
            var d = new Date(curY, curM - i, 1);
            var dy = d.getFullYear(),
              dm = d.getMonth();
            var mTotal = transactions.reduce(function (s, t) {
              if (!matchesCat(t)) return s;
              var td = new Date(t.date);
              return td.getFullYear() === dy && td.getMonth() === dm
                ? s + t.amount
                : s;
            }, 0);
            chartData.push({
              label: MONTHS_SHORT[dm],
              total: mTotal,
              current: i === 0,
            });
          }

          // Build bar chart SVG
          var maxVal = 0;
          chartData.forEach(function (d) {
            if (d.total > maxVal) maxVal = d.total;
          });
          if (!maxVal) maxVal = 1;
          var cW = 320,
            cH = 90,
            barW = 32,
            barGap = (cW - barW * 6) / 7;
          var svgParts = [
            '<svg id="cd-chart-svg" viewBox="0 0 ' +
              cW +
              " " +
              (cH + 28) +
              '" preserveAspectRatio="xMidYMid meet">',
          ];
          chartData.forEach(function (d, idx) {
            var x = barGap + idx * (barW + barGap);
            var barH = d.total > 0 ? Math.max(6, (d.total / maxVal) * cH) : 6;
            var y = cH - barH;
            var fill = d.current
              ? "rgba(167,139,250,0.85)"
              : "rgba(167,139,250,0.22)";
            svgParts.push(
              '<rect x="' +
                x.toFixed(1) +
                '" y="' +
                y.toFixed(1) +
                '" width="' +
                barW +
                '" height="' +
                barH.toFixed(1) +
                '" rx="7" fill="' +
                fill +
                '"/>',
            );
            if (d.current && d.total > 0) {
              var valLabel = formatBRL(d.total);
              svgParts.push(
                '<text x="' +
                  (x + barW / 2).toFixed(1) +
                  '" y="' +
                  (y - 7).toFixed(1) +
                  '" text-anchor="middle" fill="rgba(167,139,250,0.9)" font-size="9" font-weight="700" font-family="Inter,sans-serif">' +
                  valLabel +
                  "</text>",
              );
            }
            var lc = d.current ? "#fff" : "rgba(255,255,255,0.4)";
            var lw = d.current ? "700" : "400";
            svgParts.push(
              '<text x="' +
                (x + barW / 2).toFixed(1) +
                '" y="' +
                (cH + 20) +
                '" text-anchor="middle" fill="' +
                lc +
                '" font-size="11" font-weight="' +
                lw +
                '" font-family="Inter,sans-serif">' +
                d.label +
                "</text>",
            );
          });
          svgParts.push("</svg>");
          var chartSvg = svgParts.join("");

          // Group current-month transactions by date (day)
          var groups = {};
          var groupOrder = [];
          curTxns.forEach(function (t) {
            var td = new Date(t.date);
            var key = td.getDate() + " de " + MONTHS_FULL[td.getMonth()];
            if (!groups[key]) {
              groups[key] = [];
              groupOrder.push(key);
            }
            groups[key].push(t);
          });

          // Build transactions HTML
          var txnHtml = "";
          groupOrder.forEach(function (groupKey) {
            txnHtml += '<div class="cd-txn-group-title">' + groupKey + "</div>";
            groups[groupKey].forEach(function (t) {
              var td = new Date(t.date);
              var hm =
                td.getHours() + "h" + String(td.getMinutes()).padStart(2, "0");
              txnHtml +=
                '<div class="cd-txn-row">' +
                '<div class="cd-txn-icon">' +
                iconHtml +
                "</div>" +
                '<div style="flex:1;min-width:0;">' +
                '<div class="cd-txn-title">' +
                (t.title || "Transação") +
                "</div>" +
                "</div>" +
                '<div style="text-align:right;flex-shrink:0;">' +
                '<div class="cd-txn-amount">- ' +
                formatBRL(t.amount) +
                "</div>" +
                '<div class="cd-txn-date">' +
                hm +
                "</div>" +
                "</div>" +
                "</div>";
            });
          });

          var countText =
            curTxns.length + " gasto" + (curTxns.length !== 1 ? "s" : "");
          var emptyHtml =
            curTxns.length === 0
              ? '<div id="cd-empty">Nenhum gasto em ' + monthLabel + "</div>"
              : "";

          // Assemble body
          var body = document.getElementById("cat-detail-body");
          body.innerHTML =
            // Hero card
            '<div class="cd-card">' +
            '<div id="cd-hero">' +
            '<div id="cd-hero-icon">' +
            iconHtml +
            "</div>" +
            '<div><div id="cd-hero-name">' +
            catName +
            "</div>" +
            '<div id="cd-hero-period">' +
            monthLabel +
            "</div></div>" +
            '<div id="cd-hero-total">' +
            formatBRL(curTotal) +
            "</div>" +
            "</div></div>" +
            // Chart card
            '<div class="cd-card">' +
            '<div class="cd-section-label">Hist\u00f3rico de gastos</div>' +
            chartSvg +
            "</div>" +
            // Transactions card
            '<div class="cd-card" style="margin-bottom:5rem;">' +
            '<div id="cd-txn-count">' +
            countText +
            " em " +
            monthLabel +
            "</div>" +
            (curTxns.length > 0 ? txnHtml : emptyHtml) +
            "</div>";

          detailEl.scrollTop = 0;
          detailEl.classList.add("open");
        }

        function isOnCatPage() {
          // Only the categories page has .space-y-8 with a .glass-panel.space-y-4 inside
          return !!document.querySelector(".space-y-8 .glass-panel.space-y-4");
        }

        function buildCatList() {
          if (window.innerWidth >= 768) return;
          if (observerPaused) return;
          if (!isOnCatPage()) {
            if (listEl) listEl.style.display = "none";
            return;
          }

          var cats8 = document.querySelector(".space-y-8");
          if (!cats8) return;

          // Gather pills: each pill wrapper is a div inside flex.flex-wrap.gap-2
          var pills = Array.from(
            cats8.querySelectorAll(".flex.flex-wrap.gap-2 > div"),
          );

          // Skip if pills not rendered yet
          if (pills.length === 0) return;

          // Don't rebuild while any pill is in React edit mode
          if (
            pills.some(function (w) {
              return !w.querySelector(".group.relative");
            })
          )
            return;

          // Hide all native React sections via JS
          Array.from(cats8.children).forEach(function (ch) {
            ch.style.display = "none";
          });

          if (!listEl) {
            listEl = document.createElement("div");
            listEl.id = "cat-list";
            listEl.innerHTML = '<div class="cat-list-title">Categorias</div>';
          }

          // Clear rows (keep title)
          while (listEl.children.length > 1)
            listEl.removeChild(listEl.lastChild);

          // Compute net balance per category directly from localStorage
          var allTxs = [];
          try {
            allTxs = JSON.parse(
              localStorage.getItem("finance_transactions") || "[]",
            );
          } catch (e) {}
          var netBalance = {};
          allTxs.forEach(function (t) {
            var name = t.categoryName || "";
            if (!name) return;
            if (netBalance[name] === undefined) netBalance[name] = 0;
            netBalance[name] += t.type === "income" ? t.amount : -t.amount;
          });

          pills.forEach(function (wrapper) {
            // Find the group div (non-editing state)
            var groupDiv = wrapper.querySelector(".group.relative");
            if (!groupDiv) return;

            // Get category name from the text button
            var nameBtn = groupDiv.querySelector("button.flex-1");
            if (!nameBtn) return;
            var name = nameBtn.textContent.trim();
            if (!name) return;

            // Icon is in the dedicated icon button (flex-shrink-0 p-2)
            var iconBtn = groupDiv.querySelector("button.flex-shrink-0");
            var iconEl = iconBtn ? iconBtn.firstElementChild : null;
            var iconHtml = iconEl
              ? iconEl.outerHTML
              : '<div style="width:2.5rem;height:2.5rem;border-radius:0.75rem;background:rgba(255,255,255,0.1);"></div>';

            // Give the wrapper a data attribute for finding edit/delete buttons
            var catId = "cat-" + name.toLowerCase().replace(/\s+/g, "-");
            wrapper.setAttribute("data-cat-pill", catId);

            var net = netBalance[name] !== undefined ? netBalance[name] : null;
            var isExpense = net !== null && net < 0;
            var isIncome = net !== null && net >= 0;
            var iconColor = isExpense
              ? "rgb(239,68,68)"
              : isIncome
                ? "rgb(74,222,128)"
                : "rgba(255,255,255,0.5)";
            var iconBg = isExpense
              ? "rgba(239,68,68,0.12)"
              : isIncome
                ? "rgba(74,222,128,0.12)"
                : "rgba(255,255,255,0.08)";
            var amountHtml = "";
            if (net !== null && net !== 0) {
              var absStr = formatBRL(Math.abs(net));
              var sign = net < 0 ? "-\u00a0" : "+\u00a0";
              var amtColor =
                net < 0
                  ? "color:rgba(239,68,68,0.8)"
                  : "color:rgba(74,222,128,0.8)";
              amountHtml =
                '<div class="cat-row-total" style="' +
                amtColor +
                '">' +
                sign +
                absStr +
                "</div>";
            }

            var row = document.createElement("div");
            row.className = "cat-row";
            row.dataset.catId = catId;
            row.dataset.name = name;
            row.innerHTML =
              '<div class="cat-row-icon" style="flex-shrink:0;width:2.5rem;height:2.5rem;border-radius:0.75rem;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;">' +
              iconHtml +
              "</div>" +
              '<div class="cat-row-name">' +
              name +
              "</div>" +
              '<div class="cat-row-right">' +
              amountHtml +
              "</div>";

            // Override icon colors after insertion
            var iconDiv = row.querySelector(".cat-row-icon");
            if (iconDiv) {
              var innerIconDiv = iconDiv.firstElementChild;
              if (innerIconDiv) {
                innerIconDiv.style.background = iconBg;
                innerIconDiv.style.color = iconColor;
                // Force SVG color - overrides Tailwind text-primary class
                var svg = innerIconDiv.querySelector("svg");
                if (svg) svg.style.color = iconColor;
              }
              // Tap icon to change it
              iconDiv.addEventListener("click", function (e) {
                e.stopPropagation();
                openIconPicker(catId);
              });
            }

            // Long-press on the row
            row.addEventListener(
              "touchstart",
              function (e) {
                catPressing = true;
                catPressTimer = setTimeout(function () {
                  if (catPressing) {
                    catLongPressed = true;
                    openCatModal(row);
                    navigator.vibrate && navigator.vibrate(40);
                  }
                }, 600);
              },
              { passive: true },
            );

            row.addEventListener(
              "touchend",
              function () {
                catPressing = false;
                clearTimeout(catPressTimer);
              },
              { passive: true },
            );

            row.addEventListener(
              "touchmove",
              function () {
                catPressing = false;
                clearTimeout(catPressTimer);
              },
              { passive: true },
            );

            // Tap row (not icon) → category detail page
            row.addEventListener("click", function (e) {
              if (catLongPressed) {
                catLongPressed = false;
                return;
              }
              if (e.target.closest(".cat-row-icon")) return;
              openCatDetail(name, iconHtml);
            });

            listEl.appendChild(row);
          });

          // Inject list into main before the cats8 div (not inside it)
          var mainEl = cats8.closest("main") || document.querySelector("main");
          if (mainEl && !mainEl.contains(listEl)) {
            // Use cats8 as reference only if it's still a direct child of mainEl
            var refNode = cats8.parentNode === mainEl ? cats8 : null;
            mainEl.insertBefore(listEl, refNode);
          }
          listEl.style.display = ""; // CSS controls: block on mobile, none on desktop
        }

        // Watch DOM for category page rendering
        var pending2 = false;
        new MutationObserver(function () {
          if (pending2) return;
          pending2 = true;
          requestAnimationFrame(function () {
            pending2 = false;
            buildCatList();
          });
        }).observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <style>
      /* Category icon coloring based on net balance */
      [data-dn-type="expense"] {
        background: rgba(239, 68, 68, 0.12) !important;
        color: rgb(239, 68, 68) !important;
      }
      [data-dn-type="expense"] svg,
      [data-dn-type="expense"] svg * {
        color: rgb(239, 68, 68) !important;
        stroke: rgb(239, 68, 68) !important;
      }
      [data-dn-type="income"] {
        background: rgba(74, 222, 128, 0.12) !important;
        color: rgb(74, 222, 128) !important;
      }
      [data-dn-type="income"] svg,
      [data-dn-type="income"] svg * {
        color: rgb(74, 222, 128) !important;
        stroke: rgb(74, 222, 128) !important;
      }
    </style>
    <script>
      // Color category icons red (expense) or green (income) based on net balance
      (function () {
        function getNetByName() {
          var txs = [];
          try {
            txs = JSON.parse(
              localStorage.getItem("finance_transactions") || "[]",
            );
          } catch (e) {}
          var net = {};
          txs.forEach(function (t) {
            var name = t.categoryName || "";
            if (!name) return;
            if (net[name] === undefined) net[name] = 0;
            net[name] += t.type === "income" ? t.amount : -t.amount;
          });
          return net;
        }

        function colorIcons() {
          var net = getNetByName();
          // The ss() React component renders: div.rounded-2xl.bg-primary/10 > svg.text-primary
          // or div.rounded-2xl.bg-white/10 (letter fallback)
          var wrappers = document.querySelectorAll(
            ".rounded-2xl.bg-primary\\/10, .rounded-2xl.bg-white\\/10",
          );
          wrappers.forEach(function (el) {
            // Skip our own widget icons
            if (el.closest("#dn-overview-widget")) return;
            var parent = el.parentElement;
            if (!parent) return;
            // Find the sibling div that holds the category name in a <p>
            var sibling = null;
            for (var i = 0; i < parent.children.length; i++) {
              var c = parent.children[i];
              if (c !== el) {
                sibling = c;
                break;
              }
            }
            if (!sibling) return;
            // Transaction list: category name is in span.text-xs.text-muted-foreground
            // Dashboard summary: category name is in p (first child)
            var nameEl =
              sibling.querySelector("span.text-xs.text-muted-foreground") ||
              sibling.querySelector("p");
            if (!nameEl) return;
            var catName = nameEl.textContent.trim();
            if (!catName || catName === "Sem categoria") return;
            var balance = net[catName];
            if (balance === undefined) return;
            var type = balance < 0 ? "expense" : "income";
            if (el.dataset.dnType !== type) {
              el.dataset.dnType = type;
            }
          });
        }

        var pending = false;
        new MutationObserver(function () {
          if (pending) return;
          pending = true;
          requestAnimationFrame(function () {
            pending = false;
            colorIcons();
          });
        }).observe(document.body, { childList: true, subtree: true });

        setTimeout(colorIcons, 600);
        setTimeout(colorIcons, 1500);
      })();
    </script>
  </body>
</html>
