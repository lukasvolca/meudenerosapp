<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Meu Deneros</title>
    <link rel="icon" type="image/svg+xml" href="/meudenerosapp/favicon.svg" />
    <link rel="manifest" href="/meudenerosapp/manifest.json" />
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meu Deneros" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" crossorigin href="/meudenerosapp/assets/index-pceCBsj8.css">
    <style>
      @media (min-width: 1024px) {
        .lg\:grid-cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      }
      .text-teal { color: #2dd4bf; }
      @media (max-width: 1023px) {
        .ml-64 { margin-left: 60px !important; }
        .__sb { width: 60px !important; overflow: hidden; transition: width 0.3s ease; }
        .__sb.open { width: 256px !important; }
        /* Header: center wallet icon, hide text when collapsed */
        .__sb:not(.open) > div:first-child { padding: 14px 10px !important; justify-content: center !important; }
        .__sb:not(.open) > div:first-child span { display: none !important; }
        /* Nav: center icons, hide labels via font-size:0 */
        .__sb:not(.open) nav { padding: 12px 8px !important; }
        .__sb:not(.open) nav a { padding: 12px 0 !important; justify-content: center !important; gap: 0 !important; font-size: 0 !important; }
        .__sb:not(.open) nav a svg { width: 20px !important; height: 20px !important; }
        /* Footer: hide when collapsed */
        .__sb:not(.open) > div:last-child { display: none !important; }
        /* Fix content overflow */
        .flex-1.ml-64 { overflow-x: hidden; min-width: 0; }
        /* Transaction items: fix mobile layout */
        .group.glass-panel { overflow: hidden; }
        .group.glass-panel > div:first-child { min-width: 0; flex: 1; overflow: hidden; }
        .group.glass-panel > div:first-child > div { min-width: 0; }
        .group.glass-panel p[class*="font-semibold"] { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .group.glass-panel span[class*="text-muted-foreground"] { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; display: inline-block; vertical-align: bottom; }
        .group.glass-panel span[class*="font-bold"] { white-space: nowrap; flex-shrink: 0; }
        .group.glass-panel .opacity-0 { display: none !important; }
        /* Category filter: dropdown on mobile */
        .__cat-select { display: block !important; }
        .__cat-pills { display: flex !important; flex-direction: column; gap: 8px; margin-top: 8px; }
        .__cat-pills > button:first-child { display: none !important; }
        .__cat-pills > div { display: none; }
        /* Edit/delete always visible on mobile */
        .__cat-pills .opacity-0 { opacity: 1 !important; }
        /* Overlay */
        .__overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 45; }
        .__overlay.show { display: block; }
      }
      @media (min-width: 1024px) {
        .__sb { width: 256px !important; overflow: visible !important; }
        /* Desktop: show pills, hide dropdown */
        .__cat-pills { display: flex !important; }
        .__cat-select { display: none !important; }
      }
      .__hmbg { display: none !important; }

      #auth-overlay {
        position: fixed; inset: 0;
        background: #0a0f1e;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
      }
      #auth-overlay.hidden { display: none; }

      .auth-card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 36px 32px;
        width: 100%; max-width: 360px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      }
      .auth-icon { font-size: 32px; margin-bottom: 16px; }
      .auth-card h1 { font-size: 20px; font-weight: 700; color: #f9fafb; margin: 0 0 20px; }

      .auth-tabs {
        display: flex; gap: 0;
        border: 1px solid #1f2937; border-radius: 8px;
        margin-bottom: 24px; overflow: hidden;
      }
      .auth-tab {
        flex: 1; padding: 9px;
        background: transparent; border: none;
        color: #6b7280; font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
        cursor: pointer; transition: all 0.15s;
      }
      .auth-tab.active { background: #1f2937; color: #f9fafb; }

      .auth-label { display: block; font-size: 13px; font-weight: 500; color: #9ca3af; margin-bottom: 6px; }
      .auth-input {
        width: 100%; padding: 10px 12px;
        background: #0a0f1e; border: 1px solid #1f2937; border-radius: 8px;
        color: #f9fafb; font-size: 14px; font-family: 'Inter', sans-serif;
        box-sizing: border-box; margin-bottom: 14px;
        outline: none; transition: border-color 0.15s;
      }
      .auth-input:focus { border-color: #2dd4bf; }
      .auth-input::placeholder { color: #374151; }
      .auth-btn {
        width: 100%; padding: 11px;
        background: #2dd4bf; color: #0a0f1e;
        border: none; border-radius: 8px;
        font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif;
        cursor: pointer; margin-top: 6px; transition: background 0.15s;
      }
      .auth-btn:hover:not(:disabled) { background: #14b8a6; }
      .auth-btn:disabled { opacity: 0.45; cursor: not-allowed; }
      .auth-error {
        background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25);
        color: #fca5a5; padding: 9px 12px; border-radius: 8px;
        font-size: 13px; margin-bottom: 14px; display: none;
      }
      .auth-error.show { display: block; }
      .auth-success {
        background: rgba(45,212,191,.1); border: 1px solid rgba(45,212,191,.25);
        color: #5eead4; padding: 9px 12px; border-radius: 8px;
        font-size: 13px; margin-bottom: 14px; display: none;
      }
      .auth-success.show { display: block; }
      .auth-status { text-align: center; color: #6b7280; font-size: 13px; padding: 12px 0; }

      #logout-btn {
        position: fixed; top: 14px; right: 16px; z-index: 1000;
        padding: 6px 14px;
        background: transparent; border: 1px solid #1f2937; border-radius: 6px;
        color: #6b7280; font-size: 12px; font-weight: 500; font-family: 'Inter', sans-serif;
        cursor: pointer; display: none; transition: all 0.15s;
      }
      #logout-btn:hover { background: #111827; color: #f9fafb; }
    </style>
  </head>
  <body>
    <div id="auth-overlay">
      <div class="auth-card">
        <div class="auth-icon">💰</div>
        <h1>Finance Tracker</h1>

        <div id="auth-status" class="auth-status">Verificando sessão...</div>

        <div id="auth-form" style="display:none">
          <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Entrar</button>
            <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Criar conta</button>
          </div>

          <div id="auth-error" class="auth-error"></div>
          <div id="auth-success" class="auth-success"></div>

          <!-- Login -->
          <div id="panel-login">
            <label class="auth-label">Email</label>
            <input class="auth-input" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
            <label class="auth-label">Senha</label>
            <input class="auth-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
            <button class="auth-btn" id="btn-login" onclick="doLogin()">Entrar</button>
          </div>

          <!-- Signup -->
          <div id="panel-signup" style="display:none">
            <label class="auth-label">Email</label>
            <input class="auth-input" type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email" />
            <label class="auth-label">Senha</label>
            <input class="auth-input" type="password" id="signup-password" placeholder="mínimo 6 caracteres" autocomplete="new-password" />
            <label class="auth-label">Confirmar senha</label>
            <input class="auth-input" type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password" />
            <button class="auth-btn" id="btn-signup" onclick="doSignup()">Criar conta</button>
          </div>
        </div>
      </div>
    </div>

    <button id="logout-btn">Sair</button>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
    (function () {
      'use strict';
      var SURL = 'https://jqwqwupqqyfyagmavido.supabase.co';
      var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impxd3F3dXBxcXlmeWFnbWF2aWRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTQ0MTEsImV4cCI6MjA5MzY3MDQxMX0.jFGhtIUB7t_c_-k5SOMRSJajBLjVx4agCvt0g2RbJFY';
      var sb = window.supabase.createClient(SURL, SKEY);
      window._sb = sb;

      var nativeSet = localStorage.setItem.bind(localStorage);
      var syncTimer = null;

      localStorage.setItem = function (key, value) {
        nativeSet(key, value);
        if (key === 'finance_transactions' || key === 'finance_categories') {
          clearTimeout(syncTimer);
          syncTimer = setTimeout(pushToCloud, 1200);
        }
      };

      function silentWrite(key, value) { nativeSet(key, value); }

      window._pa = function(v) {
        var s = String(v || "0");
        return s.indexOf(",") !== -1
          ? parseFloat(s.replace(/\./g, "").replace(",", ".")) || 0
          : parseFloat(s) || 0;
      };
      window._userProfile = {};
      window._saveProfile = async function(name, avatarBase64) {
        var data = { display_name: name };
        if (avatarBase64 !== void 0) data.avatar = avatarBase64;
        var res = await sb.auth.updateUser({ data: data });
        if (!res.error) {
          window._userProfile.name = name;
          if (avatarBase64 !== void 0) window._userProfile.avatar = avatarBase64;
        }
        return res.error;
      };

      async function pushToCloud() {
        try {
          var sess = (await sb.auth.getSession()).data.session;
          if (!sess) return;
          var txns = JSON.parse(localStorage.getItem('finance_transactions') || '[]');
          var cats = JSON.parse(localStorage.getItem('finance_categories') || '[]');
          await sb.from('user_data').upsert({
            user_id: sess.user.id, transactions: txns, categories: cats,
            updated_at: new Date().toISOString()
          });
        } catch (e) { console.warn('[sync]', e); }
      }

      async function loadUserData(userId) {
        var res = await sb.from('user_data').select('transactions,categories').eq('user_id', userId).maybeSingle();
        if (res.data) {
          silentWrite('finance_transactions', JSON.stringify(res.data.transactions || []));
          silentWrite('finance_categories', JSON.stringify(res.data.categories || []));
        } else {
          var txns = JSON.parse(localStorage.getItem('finance_transactions') || '[]');
          var cats = JSON.parse(localStorage.getItem('finance_categories') || '[]');
          await sb.from('user_data').upsert({ user_id: userId, transactions: txns, categories: cats });
        }
        try {
          var raw = JSON.parse(localStorage.getItem('finance_transactions') || '[]');
          var cleaned = raw.filter(function (t) { return !t.id || t.id.indexOf('__carryover__') !== 0; });
          if (cleaned.length !== raw.length) silentWrite('finance_transactions', JSON.stringify(cleaned));
        } catch (e) {}
        // Migra "Pagamentos" sem tipo para income
        try {
          var cats2 = JSON.parse(localStorage.getItem('finance_categories') || '[]');
          var changed = false;
          var cats2up = cats2.map(function(c) {
            if (c.name === 'Pagamentos' && !c.type) { changed = true; return Object.assign({}, c, {type: 'income'}); }
            return c;
          });
          if (changed) {
            silentWrite('finance_categories', JSON.stringify(cats2up));
            var txns2 = JSON.parse(localStorage.getItem('finance_transactions') || '[]');
            await sb.from('user_data').upsert({ user_id: userId, transactions: txns2, categories: cats2up, updated_at: new Date().toISOString() });
          }
        } catch (e) {}
      }

      function launchApp(session) {
        if (session) {
          window._userProfile = {
            name: (session.user.user_metadata && session.user.user_metadata.display_name) || '',
            email: session.user.email || '',
            avatar: (session.user.user_metadata && session.user.user_metadata.avatar) || null
          };
        }
        var s = document.createElement('script');
        s.type = 'module'; s.crossOrigin = ''; s.src = '/meudenerosapp/assets/index-Cy3ILb9M.js';
        document.head.appendChild(s);
        document.getElementById('auth-overlay').classList.add('hidden');
      }

      function showLoginForm() {
        document.getElementById('auth-status').style.display = 'none';
        document.getElementById('auth-form').style.display = 'block';
      }

      function showError(msg) {
        var el = document.getElementById('auth-error');
        el.textContent = msg; el.classList.add('show');
        document.getElementById('auth-success').classList.remove('show');
      }

      function showSuccess(msg) {
        var el = document.getElementById('auth-success');
        el.textContent = msg; el.classList.add('show');
        document.getElementById('auth-error').classList.remove('show');
      }

      function clearMessages() {
        document.getElementById('auth-error').classList.remove('show');
        document.getElementById('auth-success').classList.remove('show');
      }

      window.switchTab = function (tab) {
        clearMessages();
        document.getElementById('tab-login').classList.toggle('active', tab === 'login');
        document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
        document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('panel-signup').style.display = tab === 'signup' ? 'block' : 'none';
      };

      window.doLogin = async function () {
        var email = document.getElementById('login-email').value.trim();
        var pass = document.getElementById('login-password').value;
        if (!email || !pass) { showError('Preencha email e senha.'); return; }
        document.getElementById('btn-login').disabled = true;
        clearMessages();
        var res = await sb.auth.signInWithPassword({ email: email, password: pass });
        if (res.error) {
          showError('Email ou senha incorretos.');
          document.getElementById('btn-login').disabled = false;
          return;
        }
        await loadUserData(res.data.user.id);
        launchApp(res.data.session);
      };

      window.doSignup = async function () {
        var email = document.getElementById('signup-email').value.trim();
        var pass = document.getElementById('signup-password').value;
        var confirm = document.getElementById('signup-confirm').value;
        if (!email || !pass) { showError('Preencha email e senha.'); return; }
        if (pass.length < 6) { showError('A senha precisa ter pelo menos 6 caracteres.'); return; }
        if (pass !== confirm) { showError('As senhas não coincidem.'); return; }
        document.getElementById('btn-signup').disabled = true;
        clearMessages();
        var res = await sb.auth.signUp({ email: email, password: pass });
        if (res.error) {
          showError('Erro ao criar conta: ' + res.error.message);
          document.getElementById('btn-signup').disabled = false;
          return;
        }
        await loadUserData(res.data.user.id);
        launchApp(res.data.session);
      };

      document.getElementById('logout-btn').addEventListener('click', async function () {
        await sb.auth.signOut();
        silentWrite('finance_transactions', '[]');
        silentWrite('finance_categories', '[]');
        window.location.reload();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        var loginVisible = document.getElementById('panel-login').style.display !== 'none';
        if (loginVisible) doLogin(); else doSignup();
      });

      sb.auth.getSession().then(function (res) {
        var sess = res.data.session;
        if (sess) {
          loadUserData(sess.user.id).then(function() { launchApp(sess); });
        } else {
          showLoginForm();
        }
      });
    })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/meudenerosapp/sw.js');
      }

      // Mobile sidebar drawer
      (function() {
        var overlay = document.createElement('div');
        overlay.className = '__overlay';
        overlay.onclick = close;
        document.body.appendChild(overlay);


        function getSidebar() {
          return document.querySelector('.w-64.h-screen.fixed.left-0');
        }
        function toggle() {
          var sb = getSidebar();
          if (!sb) return;
          var isOpen = sb.classList.contains('open');
          if (isOpen) { close(); } else { open(); }
        }
        function open() {
          var sb = getSidebar();
          if (sb) { sb.classList.add('__sb', 'open'); }
          overlay.classList.add('show');
        }
        function close() {
          var sb = getSidebar();
          if (sb) { sb.classList.remove('open'); }
          overlay.classList.remove('show');
        }

        // Keep __sb class on sidebar after React re-renders
        var obs = new MutationObserver(function() {
          var sb = getSidebar();
          if (sb && !sb.classList.contains('__sb')) {
            sb.classList.add('__sb');
            // Re-attach wallet icon cursor on every re-render
            var icon = sb.querySelector('div[class*="w-10 h-10"]');
            if (icon) icon.style.cursor = 'pointer';
          }
        });
        obs.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });

        // Event delegation: wallet icon toggle (works after any re-render)
        document.addEventListener('click', function(e) {
          if (window.innerWidth >= 1024) return;
          var sb = getSidebar();
          if (!sb) return;
          var icon = sb.querySelector('div[class*="w-10 h-10"]');
          if (icon && (icon === e.target || icon.contains(e.target))) toggle();
        });

        // Close sidebar when nav link is clicked on mobile
        document.addEventListener('click', function(e) {
          if (window.innerWidth >= 1024) return;
          if (e.target.closest('a') && getSidebar()) close();
        });

        // Category cards: show only selected (by index matching dropdown)
        var catUpdateTimer = null;
        function updateCatCards() {
          if (window.innerWidth >= 1024) return;
          var pills = document.querySelector('.__cat-pills');
          var sel = document.querySelector('.__cat-select');
          if (!pills || !sel) return;
          var val = sel.value;
          // Collect only div children (category cards), skip buttons
          var divs = Array.from(pills.children).filter(function(c) { return c.tagName !== 'BUTTON'; });
          // selectedIndex 0 = "Todas", 1+ = categories (matches divs[0], divs[1]...)
          var targetIdx = val === 'all' ? -1 : sel.selectedIndex - 1;
          divs.forEach(function(d, i) {
            d.style.display = (i === targetIdx) ? 'block' : 'none';
          });
          // Also hide pill buttons
          Array.from(pills.children).filter(function(c) { return c.tagName === 'BUTTON'; })
            .forEach(function(b) { b.style.display = 'none'; });
        }

        function scheduleUpdate() {
          clearTimeout(catUpdateTimer);
          catUpdateTimer = setTimeout(updateCatCards, 60);
        }

        new MutationObserver(scheduleUpdate)
          .observe(document.body, { childList: true, subtree: true });

        document.addEventListener('change', function(e) {
          if (e.target.classList.contains('__cat-select')) scheduleUpdate();
        });
      })();
    </script>
  </body>
</html>
