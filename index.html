<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Finance Tracker</title>
    <link rel="icon" type="image/svg+xml" href="/meudenerosapp/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      @media (min-width: 1024px) {
        .lg\:grid-cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      }
      .text-teal { color: #2dd4bf; }
    </style>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("finance_transactions");
          if (!raw) return;
          var txns = JSON.parse(raw);
          var cleaned = txns.filter(function (t) {
            return !t.id || t.id.indexOf("__carryover__") !== 0;
          });
          if (cleaned.length !== txns.length) {
            localStorage.setItem("finance_transactions", JSON.stringify(cleaned));
          }
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" crossorigin href="/meudenerosapp/assets/index-pceCBsj8.css">
  </head>

  </body>
