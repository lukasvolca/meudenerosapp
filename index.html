    <script>
      // Restore path from GitHub Pages 404.html redirect
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            });
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) +
              decoded[0] +
              (decoded[1] ? "?" + decoded[1] : "") +
              l.hash,
          );
        }
      })(window.location);
    </script>

    <div id="root"></div>
    <script>
      /* ==========================================
         Monthly Overview Widget
         ========================================== */
      (function () {
        "use strict";

        var MONTH_NAMES = [
          "Janeiro",
          "Fevereiro",
          "Março",
          "Abril",
          "Maio",
          "Junho",
          "Julho",
          "Agosto",
          "Setembro",
          "Outubro",
          "Novembro",
          "Dezembro",
        ];
        var PALETTE = [
          "#4ade80",
          "#fb923c",
          "#60a5fa",
          "#a78bfa",
          "#f472b6",
          "#facc15",
          "#34d399",
          "#f87171",
          "#818cf8",
          "#2dd4bf",
        ];

        function fmtBRL(n) {
          return n.toLocaleString("pt-BR", {
            style: "currency",
            currency: "BRL",
          });
        }

        function getMonthData() {
          var now = new Date();
          var year = now.getFullYear();
          var month = now.getMonth();
          var transactions = [],
            categories = [];
          try {
            transactions = JSON.parse(
              localStorage.getItem("finance_transactions") || "[]",
            );
          } catch (e) {}
          try {
            categories = JSON.parse(
              localStorage.getItem("finance_categories") || "[]",
            );
          } catch (e) {}

          var expenses = transactions.filter(function (t) {
            if (t.type !== "expense") return false;
            var d = new Date(t.date);
            return d.getFullYear() === year && d.getMonth() === month;
          });

          var byCategory = {};
          expenses.forEach(function (t) {
            var id = t.categoryId || "__none__";
            if (!byCategory[id]) {
              var cat = categories.find(function (c) {
                return c.id === id;
              });
              byCategory[id] = {
                id: id,
                name: (cat && cat.name) || t.categoryName || "Outros",
                total: 0,
              };
            }
            byCategory[id].total += t.amount;
          });

          var sorted = Object.values(byCategory).sort(function (a, b) {
            return b.total - a.total;
          });
          var total = sorted.reduce(function (s, c) {
            return s + c.total;
          }, 0);
          return {
            sorted: sorted,
            total: total,
            monthName: MONTH_NAMES[month],
          };
        }

        function polarXY(cx, cy, r, angleDeg) {
          var rad = ((angleDeg - 90) * Math.PI) / 180;
          return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
        }

        function buildSVG(sorted, total) {
          if (!total) return "";
          var cx = 100,
            cy = 100,
            r = 70,
            sw = 22,
            gap = 2.5;
          var currentAngle = 0;
          var arcs = "";
          sorted.forEach(function (seg, i) {
            var pct = seg.total / total;
            var sweep = pct * 360 - gap;
            if (sweep <= 0) return;
            var s = polarXY(cx, cy, r, currentAngle);
            var e = polarXY(cx, cy, r, currentAngle + sweep);
            var large = sweep > 180 ? 1 : 0;
            arcs +=
              '<path d="M ' +
              s[0].toFixed(2) +
              " " +
              s[1].toFixed(2) +
              " A " +
              r +
              " " +
              r +
              " 0 " +
              large +
              " 1 " +
              e[0].toFixed(2) +
              " " +
              e[1].toFixed(2) +
              '"' +
              ' fill="none" stroke="' +
              PALETTE[i % PALETTE.length] +
              '"' +
              ' stroke-width="' +
              sw +
              '" stroke-linecap="round"/>';
            currentAngle += pct * 360;
          });
          return (
            '<svg viewBox="0 0 200 200" width="184" height="184" style="display:block;flex-shrink:0;">' +
            '<circle cx="' +
            cx +
            '" cy="' +
            cy +
            '" r="' +
            r +
            '" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="' +
            sw +
            '"/>' +
            arcs +
            "</svg>"
          );
        }

        function buildWidget() {
          var data = getMonthData();
          var sorted = data.sorted,
            total = data.total,
            monthName = data.monthName;
          var top3 = sorted.slice(0, 3);
          var svg = buildSVG(sorted, total);

          var topHtml = top3
            .map(function (cat, i) {
              var color = PALETTE[i % PALETTE.length];
              var init = cat.name.charAt(0).toUpperCase();
              return (
                '<div class="dn-cat-item">' +
                '<div class="dn-cat-icon" style="background:' +
                color +
                "1a;border:1px solid " +
                color +
                "33;color:" +
                color +
                ';">' +
                init +
                "</div>" +
                '<span class="dn-cat-amount">' +
                fmtBRL(cat.total) +
                "</span>" +
                '<span class="dn-cat-name">' +
                cat.name +
                "</span>" +
                "</div>"
              );
            })
            .join("");

          var body =
            sorted.length === 0
              ? '<p class="dn-empty">Nenhuma despesa registrada em ' +
                monthName +
                ".</p>"
              : '<div class="dn-chart-wrap">' +
                svg +
                '<div class="dn-chart-center">' +
                '<div class="dn-label">Total no mês</div>' +
                '<div class="dn-total">' +
                fmtBRL(total) +
                "</div>" +
                "</div></div>" +
                (top3.length
                  ? '<div class="dn-top-row">' + topHtml + "</div>"
                  : "");

          var el = document.createElement("div");
          el.id = "dn-overview-widget";
          el.innerHTML =
            '<div class="glass-panel dn-card">' +
            '<div class="dn-header">' +
            '<h3 class="dn-title">Gastos de ' +
            monthName +
            "</h3>" +
            '<button class="dn-link" id="dn-analyze-btn">' +
            'Analisar <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>' +
            "</button></div>" +
            body +
            "</div>";

          el.querySelector("#dn-analyze-btn").addEventListener(
            "click",
            function () {
              history.pushState(null, "", "/categories");
              window.dispatchEvent(new PopStateEvent("popstate"));
            },
          );

          return el;
        }

        var _injecting = false;

        function tryInject() {
          if (_injecting) return;

          // Check widget existence AND content integrity
          // (React reconciliation can corrupt the element in-place without removing it)
          var existing = document.getElementById("dn-overview-widget");
          if (existing) {
            if (existing.querySelector(".dn-card")) return; // intact
            existing.remove(); // corrupted: remove before re-injecting
          }

          var path = window.location.pathname;
          if (path !== "/" && path !== "") return;

          // Find "Atividade Recente" h3
          var h3s = document.querySelectorAll("h3");
          var recentH3 = null;
          for (var i = 0; i < h3s.length; i++) {
            if (h3s[i].textContent.trim() === "Atividade Recente") {
              recentH3 = h3s[i];
              break;
            }
          }
          if (!recentH3) return;

          // Walk up from the h3 until we find a node that has a previousElementSibling.
          // That sibling is the stat-cards grid, and the parent is the dashboard container.
          // This avoids relying on any specific class name.
          var activityEl = recentH3;
          var dashboard = null;
          for (var n = 0; n < 20; n++) {
            var p = activityEl.parentElement;
            if (!p) break;
            if (activityEl.previousElementSibling) {
              dashboard = p;
              break;
            }
            activityEl = p;
          }
          if (!dashboard) return;

          _injecting = true;
          var widget = buildWidget();
          dashboard.insertBefore(widget, activityEl);
          _injecting = false;
        }

        function debounce(fn, ms) {
          var t;
          return function () {
            clearTimeout(t);
            t = setTimeout(fn, ms);
          };
        }

        var debouncedInject = debounce(tryInject, 200);

        // MutationObserver: react to DOM changes.
        // Checks BOTH for removal AND for in-place corruption (widget id present but .dn-card gone).
        var observer = new MutationObserver(function () {
          var w = document.getElementById("dn-overview-widget");
          var corrupted = w && !w.querySelector(".dn-card");
          if (!w || corrupted) {
            debouncedInject();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });

        // Multiple staggered initial attempts to cover slow renders / SPA transitions
        setTimeout(tryInject, 400);
        setTimeout(tryInject, 900);
        setTimeout(tryInject, 1800);
        setTimeout(tryInject, 3500);
      })();
    </script>
    <script>
      (function () {
        var ov = document.createElement("div");
        ov.id = "mob-overlay";
        document.body.appendChild(ov);

        var btn = document.createElement("button");
        btn.id = "mob-menu-btn";
        btn.setAttribute("aria-label", "Menu");
        btn.innerHTML =
          '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>';
        document.body.appendChild(btn);

        var isOpen = false;

        function getSidebar() {
          return document.querySelector(".w-64.fixed");
        }

        function openM() {
          var s = getSidebar();
          if (!s) return;
          s.classList.add("mob-open");
          ov.classList.add("open");
          isOpen = true;
        }
        function closeM() {
          var s = getSidebar();
          if (!s) return;
          s.classList.remove("mob-open");
          ov.classList.remove("open");
          isOpen = false;
        }

        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          isOpen ? closeM() : openM();
        });
        ov.addEventListener("click", closeM);

        document.addEventListener("click", function (e) {
          if (
            isOpen &&
            e.target.closest &&
            e.target.closest("a") &&
            !e.target.closest("#mob-menu-btn")
          ) {
            setTimeout(closeM, 200);
          }
        });

        window.addEventListener("resize", function () {
          if (window.innerWidth >= 768) closeM();
        });
      })();
    </script>

      (function () {
        var pending = false;

        function run() {
          if (window.innerWidth >= 768) return;

          // Abbreviate month: "abril 2026" → "abr 2026"
          var span = document.querySelector("header.h-16 .rounded-full span");
          if (span) {

            if (txt.length > 8) {
              var p = txt.split(" ");
              if (p.length === 2)
                span.textContent = p[0].slice(0, 3) + " " + p[1];
            }
          }
        }

        new MutationObserver(function () {
          if (pending) return;
          pending = true;
          requestAnimationFrame(function () {
            pending = false;
            run();
          });
        }).observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true,
        });
      })();

                      reactBtn.click();
                      // After icon selection React returns to edit view with new icon in state.
                      // Press Enter on the input to trigger the save handler (q()).
                      setTimeout(function () {
                        var inp = cats8.querySelector(
                          '[data-cat-pill="' + catId + '"] input',
                        );
                        if (inp) {
                          inp.dispatchEvent(
                            new KeyboardEvent("keydown", {
                              key: "Enter",
                              keyCode: 13,
                              bubbles: true,
                            }),
                          );
                        } else {
                          // Fallback: click save button directly (.flex-col.gap-1.ml-1 first button)
                          var saveBtn = cats8.querySelector(
                            ".flex-col.gap-1.ml-1 button:first-child",
                          );
                          if (saveBtn) saveBtn.click();
                        }
                        setTimeout(function () { cleanupAll(false); }, 300);
                      }, 300);
                    }
                  });
                  iconGrid.appendChild(myBtn);
                });
              }
            }, 80);

            // Watch for React exiting edit mode automatically
            pickerObs = new MutationObserver(function () {
              if (!cats8.querySelector('[data-cat-pill="' + catId + '"] input')) {
                pickerObs.disconnect();
                pickerObs = null;
                cleanupAll(false);
              }
            });
            pickerObs.observe(cats8, { childList: true, subtree: true });
          }, 150);
        }

        function formatBRL(n) {
          return (
            "R$ " +
            n
              .toFixed(2)
              .replace(".", ",")
              .replace(/\B(?=(\d{3})+(?!\d))/g, ".")
          );
        }

        function isOnCatPage() {
          // Only the categories page has .space-y-8 with a .glass-panel.space-y-4 inside
          return !!document.querySelector(".space-y-8 .glass-panel.space-y-4");
        }

        function buildCatList() {
          if (window.innerWidth >= 768) return;
          if (observerPaused) return;
          if (!isOnCatPage()) {
            if (listEl) listEl.style.display = "none";
            return;
          }

          var cats8 = document.querySelector(".space-y-8");
          if (!cats8) return;

          // Gather pills: each pill wrapper is a div inside flex.flex-wrap.gap-2
          var pills = Array.from(
            cats8.querySelectorAll(".flex.flex-wrap.gap-2 > div"),
          );

          // Skip if pills not rendered yet
          if (pills.length === 0) return;

          // Don't rebuild while any pill is in React edit mode
          if (
            pills.some(function (w) {
              return !w.querySelector(".group.relative");
            })
          )
            return;

          // Hide all native React sections via JS
          Array.from(cats8.children).forEach(function (ch) {
            ch.style.display = "none";
          });

          if (!listEl) {
            listEl = document.createElement("div");
            listEl.id = "cat-list";
            listEl.innerHTML = '<div class="cat-list-title">Categorias</div>';
          }

          // Clear rows (keep title)
          while (listEl.children.length > 1)
            listEl.removeChild(listEl.lastChild);

          // Collect transaction totals per category from the stats in DOM
          // We'll read what React rendered in the transaction list section
          var totals = {};
          document
            .querySelectorAll(
              ".space-y-8 > div:last-child .glass-panel.rounded-xl.p-4.group",
            )
            .forEach(function (item) {
              // Each item has categoryName text and amount
              var catSpan = item.querySelector(
                ".text-xs.text-muted-foreground",
              );
              var amountSpan = item.querySelector(".font-bold.font-display");
              var isExpense =
                amountSpan &&
                amountSpan.textContent.trim().startsWith("-") === false &&
                item.querySelector(".text-destructive") !== null;
              if (catSpan && amountSpan) {
                var catName = catSpan.textContent.trim();
                var amtText = amountSpan.textContent
                  .replace(/[R$+\-\s]/g, "")
                  .replace(",", ".")
                  .replace(/\./g, function (m, o, s) {
                    return o < s.lastIndexOf(".") ? "" : ".";
                  });
                var amt = parseFloat(amtText) || 0;
                totals[catName] = (totals[catName] || 0) + amt;
              }
            });

          pills.forEach(function (wrapper) {
            // Find the group div (non-editing state)
            var groupDiv = wrapper.querySelector(".group.relative");
            if (!groupDiv) return;

            // Get category name from the text button
            var nameBtn = groupDiv.querySelector("button.flex-1");
            if (!nameBtn) return;
            var name = nameBtn.textContent.trim();
            if (!name) return;

            // Icon is in the dedicated icon button (flex-shrink-0 p-2)
            var iconBtn = groupDiv.querySelector("button.flex-shrink-0");
            var iconEl = iconBtn ? iconBtn.firstElementChild : null;
            var iconHtml = iconEl
              ? iconEl.outerHTML
              : '<div style="width:2.5rem;height:2.5rem;border-radius:0.75rem;background:rgba(255,255,255,0.1);"></div>';

            // Give the wrapper a data attribute for finding edit/delete buttons
            var catId = "cat-" + name.toLowerCase().replace(/\s+/g, "-");
            wrapper.setAttribute("data-cat-pill", catId);

            var total = totals[name] || 0;

            var row = document.createElement("div");
            row.className = "cat-row";
            row.dataset.catId = catId;
            row.dataset.name = name;
            row.innerHTML =
              '<div class="cat-row-icon" style="flex-shrink:0;width:2.5rem;height:2.5rem;border-radius:0.75rem;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;">' +
              iconHtml +
              "</div>" +
              '<div class="cat-row-name">' +
              name +
              "</div>" +
              '<div class="cat-row-right">' +
              '<div class="cat-row-total">' +
              (total > 0 ? formatBRL(total) : "") +
              "</div>" +
              "</div>";

            // Tap icon to change it
            var iconDiv = row.querySelector(".cat-row-icon");
            if (iconDiv) {
              iconDiv.addEventListener("click", function (e) {
                e.stopPropagation();
                openIconPicker(catId);
              });
            }

            // Long-press on the row
            row.addEventListener(
              "touchstart",
              function (e) {
                catPressing = true;
                catPressTimer = setTimeout(function () {
                  if (catPressing) {
                    openCatModal(row);
                    navigator.vibrate && navigator.vibrate(40);
                  }
                }, 600);
              },
              { passive: true },
            );

            row.addEventListener(
              "touchend",
              function () {
                catPressing = false;
                clearTimeout(catPressTimer);
              },
              { passive: true },
            );

            row.addEventListener(
              "touchmove",
              function () {
                catPressing = false;
                clearTimeout(catPressTimer);
              },
              { passive: true },
            );

            listEl.appendChild(row);
          });

          // Inject list into main before the cats8 div (not inside it)
          var mainEl = cats8.closest("main") || document.querySelector("main");
          if (mainEl && !mainEl.contains(listEl)) {
            // Use cats8 as reference only if it's still a direct child of mainEl
            var refNode = cats8.parentNode === mainEl ? cats8 : null;
            mainEl.insertBefore(listEl, refNode);
          }
          listEl.style.display = ""; // CSS controls: block on mobile, none on desktop
        }

        // Watch DOM for category page rendering
        var pending2 = false;
        new MutationObserver(function () {
          if (pending2) return;
          pending2 = true;
          requestAnimationFrame(function () {
            pending2 = false;
            buildCatList();
          });
        }).observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
