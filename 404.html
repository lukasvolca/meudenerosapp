<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Meu Deneros</title>
    <script>
      // SPA redirect trick for GitHub Pages
      // Redirects all 404s back to index.html with the path encoded as a query param
      var seg = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
